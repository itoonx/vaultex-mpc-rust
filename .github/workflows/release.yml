name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for tag + changelog

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Determine version bump from commits
        id: bump
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"

          # Get commit messages since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --format="%s" HEAD)
          else
            COMMITS=$(git log --format="%s" "$LATEST_TAG"..HEAD)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits — skipping release"
            exit 0
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          # Determine bump type
          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^feat(\(.+\))?!:|^BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No feat/fix commits — skipping release"
            exit 0
          fi

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP → v$NEW_VERSION"

      - name: Generate changelog
        if: steps.bump.outputs.skip != 'true'
        id: changelog
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          NEW_VERSION="${{ steps.bump.outputs.version }}"

          {
            echo "changelog<<CHANGELOG_EOF"

            # Features
            if [ "$LATEST_TAG" = "v0.0.0" ]; then
              FEATS=$(git log --format="%s" HEAD | grep -iE "^feat" || true)
              FIXES=$(git log --format="%s" HEAD | grep -iE "^fix" || true)
              OTHERS=$(git log --format="%s" HEAD | grep -viE "^feat|^fix" || true)
            else
              FEATS=$(git log --format="%s" "$LATEST_TAG"..HEAD | grep -iE "^feat" || true)
              FIXES=$(git log --format="%s" "$LATEST_TAG"..HEAD | grep -iE "^fix" || true)
              OTHERS=$(git log --format="%s" "$LATEST_TAG"..HEAD | grep -viE "^feat|^fix" || true)
            fi

            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Fixes"
              echo "$FIXES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo "$OTHERS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.bump.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "${{ steps.changelog.outputs.changelog }}" \
            --target main
          echo "Released $VERSION"
