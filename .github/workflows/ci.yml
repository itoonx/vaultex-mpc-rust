name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Single build job that compiles once, shares artifacts with downstream jobs
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-workspace"
          # Cache the gateway binary for E2E job
          cache-targets: true

      # Clippy (compiles everything as a side effect)
      - name: Clippy lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Tests (reuses clippy compilation — near-zero compile time)
      - name: Run tests
        run: |
          cargo test --workspace --features local-transport 2>&1 | tee /tmp/test-output.txt
          TEST_COUNT=$(grep "test result:" /tmp/test-output.txt | awk -F'[; ]' '{sum+=$4} END {print sum}')
          echo "Total tests: $TEST_COUNT"
          if [ "$TEST_COUNT" -lt 740 ]; then
            echo "::error::Test count dropped below 740 (got $TEST_COUNT) — check for accidentally deleted tests"
            exit 1
          fi

      # Build gateway binary (reuses test compilation)
      - name: Build gateway
        run: cargo build -p mpc-wallet-api

      # Upload gateway binary for E2E job
      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: gateway-binary
          path: target/debug/mpc-wallet-api
          retention-days: 1

      # Upload test binary for E2E job
      - name: Upload E2E test binary
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-binary
          path: target/debug/deps/e2e_tests-*
          retention-days: 1

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Use pre-built cargo-audit from GitHub Action (no compile from source)
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ github.token }}

  e2e:
    name: E2E tests (Vault + Redis + NATS)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      vault:
        image: hashicorp/vault:1.15
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
          VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        options: >-
          --cap-add IPC_LOCK
          --health-cmd "vault status -address=http://127.0.0.1:8200"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "wget --spider -q http://localhost:8222/healthz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-workspace"

      - name: Provision Vault secrets
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: dev-root-token
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          SERVER_SIGNING_KEY=$(openssl rand -hex 32)
          SESSION_ENCRYPTION_KEY=$(openssl rand -hex 32)

          curl -sf -X POST "$VAULT_ADDR/v1/secret/data/mpc-wallet/gateway" \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"jwt_secret\":\"$JWT_SECRET\",\"server_signing_key\":\"$SERVER_SIGNING_KEY\",\"session_encryption_key\":\"$SESSION_ENCRYPTION_KEY\",\"redis_url\":\"redis://127.0.0.1:6379\"}}"

          curl -sf "$VAULT_ADDR/v1/secret/data/mpc-wallet/gateway" \
            -H "X-Vault-Token: $VAULT_TOKEN" | jq '.data.data | keys'

      # Download pre-built gateway binary (no recompilation!)
      - name: Download gateway binary
        uses: actions/download-artifact@v4
        with:
          name: gateway-binary
          path: ./bin

      - name: Start gateway
        env:
          SECRETS_BACKEND: vault
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: dev-root-token
          NETWORK: testnet
          SESSION_BACKEND: redis
          REDIS_URL: redis://127.0.0.1:6379
          NATS_URL: nats://127.0.0.1:4222
          PORT: "3000"
          RUST_LOG: mpc_wallet_api=info
        run: |
          chmod +x ./bin/mpc-wallet-api
          ./bin/mpc-wallet-api &
          echo $! > /tmp/gateway.pid
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:3000/v1/health > /dev/null 2>&1; then
              echo "Gateway is healthy"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Gateway failed to start" && exit 1
            fi
            sleep 1
          done

      - name: Run E2E tests
        timeout-minutes: 10
        env:
          NATS_URL: nats://127.0.0.1:4222
          REDIS_URL: redis://127.0.0.1:6379
          GATEWAY_URL: http://127.0.0.1:3000
        run: |
          # All E2E tests — no skips (wait_ready() replaces sleep-based synchronization)
          cargo test -p mpc-wallet-core --test e2e_tests --features local-transport -- --ignored --test-threads=1
          kill $(cat /tmp/gateway.pid) 2>/dev/null || true
