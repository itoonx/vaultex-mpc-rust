# Ingress — TLS termination for API Gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mpc-api-ingress
  namespace: mpc-wallet
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.mpc-wallet.example.com
      secretName: mpc-api-tls
  rules:
    - host: api.mpc-wallet.example.com
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: mpc-api-gateway
                port:
                  number: 80
